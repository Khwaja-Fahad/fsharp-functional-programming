<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="Scripts/Calculator.css" />
    <style>
        [ws-template], [ws-children-template] {
            display: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: #764ba2;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        p {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 6px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-bottom: 18px;
            outline: none;
            transition: border 0.3s;
        }

            input:focus {
                border-color: #764ba2;
            }

        button {
            width: 22%;
            padding: 12px 0;
            margin: 3px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

            button:hover {
                opacity: 0.85;
                transform: scale(1.05);
            }

            button:nth-child(1) {
                background: #667eea;
                color: white;
            }

            button:nth-child(2) {
                background: #f093fb;
                color: white;
            }

            button:nth-child(3) {
                background: #4facfe;
                color: white;
            }

            button:nth-child(4) {
                background: #43e97b;
                color: white;
            }

        h2 {
            margin-top: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            font-size: 1.2rem;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <script type="text/javascript" src="Scripts/Calculator.head.js"></script>
</head>
<body>
    <div id="main"></div>
    <script type="module" src="Scripts/Calculator.min.js"></script>
</body>
</html>
